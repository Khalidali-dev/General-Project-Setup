name: iserve
description: "Church Service App"

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.11.5


dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  get: ^4.7.3
  shared_preferences: ^2.5.4
  flutter_svg: ^2.2.3
  intl: ^0.20.2
  cached_network_image: ^3.4.1
  dio: ^5.9.0
  jwt_decoder: ^2.0.1
  image_picker: ^1.2.1
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter


  flutter_lints: ^6.0.0

flutter:


  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
